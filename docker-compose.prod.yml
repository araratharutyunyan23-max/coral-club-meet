name: coral-club-meet

# Production stack — fully self-hosted media (own LiveKit SFU, like Meet/Telemost):
#   redis    — LiveKit's coordination store
#   livekit  — the SFU; media over the box's public IP (UDP 50000-50100 + TCP 7881)
#   backend  — issues LiveKit tokens + host moderation (talks to LiveKit on localhost)
#   caddy    — edge: auto-HTTPS (Let's Encrypt), serves the SPA, proxies /api and /rtc
#
# All services use host networking so WebRTC media + external-IP advertisement work
# without port gymnastics. Secrets (LiveKit key/secret) live in ./.env (gitignored);
# compose injects them as LIVEKIT_KEYS for the SFU. Build frontend/dist before up.
# Required .env: LIVEKIT_URL=wss://<host>  LIVEKIT_API_KEY=...  LIVEKIT_API_SECRET=...
#                ALLOWED_ORIGINS=*

services:
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--port', '6399', '--save', '', '--appendonly', 'no']
    network_mode: host
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: '${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}'
    volumes:
      - ./infra/livekit.prod.yaml:/etc/livekit.yaml:ro
    network_mode: host
    depends_on:
      - redis
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      PORT: '8080'
      LIVEKIT_HOST_URL: 'http://localhost:7880'
      RECORDINGS_DIR: '/recordings'
      EGRESS_OUT_DIR: '/out'
    volumes:
      - ./recordings:/recordings
    network_mode: host
    depends_on:
      - livekit
    restart: unless-stopped

  # Recording: room-composite MP4s written to ./recordings (served by backend at
  # /recordings). Heavy (headless Chrome + ffmpeg) — fine for short/small recordings
  # on this box; size up for routine recording of large calls.
  egress:
    image: livekit/egress:latest
    environment:
      EGRESS_CONFIG_BODY: |
        log_level: info
        redis:
          address: localhost:6399
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://localhost:7880
        insecure: true
    volumes:
      - ./recordings:/out
    cap_add:
      - SYS_ADMIN
    network_mode: host
    depends_on:
      - redis
      - livekit
    restart: unless-stopped

  caddy:
    build: ./infra/caddy
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
    network_mode: host
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
