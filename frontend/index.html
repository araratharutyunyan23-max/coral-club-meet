<html lang="en">

    <!-- Installable PWA: "Add to Home Screen" on Android & iOS -->

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Coral Meet" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2334e6d3'/%3E%3Cstop offset='1' stop-color='%230f9c8d'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='60' height='60' rx='14' fill='%23070a0c'/%3E%3Cg stroke='url(%23g)' fill='none' stroke-width='3.4' stroke-linecap='round'%3E%3Cpath d='M30 9a21 21 0 0 1 0 42'/%3E%3Cpath d='M30 19a11 11 0 0 1 0 22'/%3E%3C/g%3E%3Ccircle cx='30' cy='30' r='4.4' fill='%23ff7e63'/%3E%3C/svg%3E"
    />
    <!-- Fonts are self-hosted (imported in src/main.tsx via @fontsource) so the
         page never blocks on an external, RU-throttled Google Fonts request. -->

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the service worker so the app is installable and has an offline shell.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {})
        })
      }
    </script>
  </body>
</html>
