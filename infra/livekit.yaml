# LiveKit config (replaces --dev) so Egress can coordinate via Redis.
# Local dev values — devkey/secret, host networking, no external IP.
port: 7880
log_level: info
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false
keys:
  devkey: secret
redis:
  address: localhost:6399
room:
  auto_create: true
