# Production nginx (runs in the `web` container): serves the built frontend and
# proxies the API to the `backend` service. HTML/SW are no-store so deploys are
# picked up immediately; hashed /assets are cached forever.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /healthz { proxy_pass http://backend:8080; }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }
    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
