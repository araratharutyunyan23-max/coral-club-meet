# Self-hosted LiveKit SFU (production). API keys come from the LIVEKIT_KEYS env
# var (set by compose from .env) so no secret lives in this file. Media uses the
# box's public IP directly (use_external_ip); signaling (7880) stays local and is
# fronted by Caddy over wss. UDP 50000-50100 + TCP 7881 must be open in the firewall.
port: 7880
log_level: info
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false
  node_ip: 72.56.252.150
redis:
  address: localhost:6399
room:
  auto_create: true
