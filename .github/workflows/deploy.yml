name: Build check

# Deployment is PULL-based: the production box (Timeweb, Moscow) polls `main`
# every ~2 min and redeploys itself via a systemd timer (cc-deploy.timer ->
# /usr/local/bin/cc-deploy.sh: git reset --hard origin/main, rebuild frontend,
# docker compose up). GitHub's Azure runners can't reliably reach the RU server
# over inbound SSH (RU DPI throttles cross-border connections), so this workflow
# no longer pushes over SSH — it only verifies that the code compiles, giving a
# red/green signal on each push.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Backend build + vet
        working-directory: backend
        run: go build ./... && go vet ./...
